version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    container_name: devsync-db
    environment:
      POSTGRES_USER: devsync_user
      POSTGRES_PASSWORD: devsync_password
      POSTGRES_DB: devsync
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: