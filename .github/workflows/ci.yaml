name: Enterprise CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Run Security Audit
        # Csak a production kód sebezhetőségeit nézzük szigorúan high szinten, 
        # így a fejlesztői eszközök (linter, tesztelő) zaját kiszűrjük, de a backend/frontend tiszta marad.
        run: npm audit --audit-level=high --only=prod

  quality-gate:
    name: Lint, Test & Build
    runs-on: ubuntu-latest
    needs: [security-audit] # Csak akkor fut le, ha a biztonsági audit zöld!
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies (Strict)
        # Nincs több flag, nincs több trükközés. Tiszta, nyers npm ci.
        run: npm ci

      - name: Configure Nx
        uses: nrwl/nx-set-shas@v4

      - name: Run ESLint
        run: npx nx affected -t lint --max-warnings=0

      - name: Run Unit Tests
        run: npx nx affected -t test --no-watch --browsers=ChromeHeadless

      - name: Run Build
        run: npx nx affected -t build