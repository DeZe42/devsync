name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  security-audit:
    name: 1. Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run Security Audit
        run: npm audit --audit-level=high --omit=dev

  install-dependencies:
    name: 2. Install Dependencies
    runs-on: ubuntu-latest
    needs: [security-audit]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies (Strict)
        run: npm ci

      - name: Upload node_modules as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-modules-artifact
          path: node_modules/
          retention-days: 1

  lint:
    name: 3. Run Linter
    runs-on: ubuntu-latest
    needs: [install-dependencies]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Download node_modules
        uses: actions/download-artifact@v4
        with:
          name: node-modules-artifact
          path: node_modules/

      - name: Configure Nx
        uses: nrwl/nx-set-shas@v4

      - name: Run ESLint
        run: npx nx affected -t lint --max-warnings=0

  test:
    name: 3. Run Unit Tests
    runs-on: ubuntu-latest
    needs: [install-dependencies]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Download node_modules
        uses: actions/download-artifact@v4
        with:
          name: node-modules-artifact
          path: node_modules/

      - name: Configure Nx
        uses: nrwl/nx-set-shas@v4

      - name: Run Unit Tests
        run: npx nx affected -t test --no-watch --browsers=ChromeHeadless

  build:
    name: 3. Run Build
    runs-on: ubuntu-latest
    needs: [install-dependencies]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Download node_modules
        uses: actions/download-artifact@v4
        with:
          name: node-modules-artifact
          path: node_modules/

      - name: Configure Nx
        uses: nrwl/nx-set-shas@v4

      - name: Run Build
        run: npx nx affected -t build